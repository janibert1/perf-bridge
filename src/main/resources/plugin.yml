name: PerfBridge
version: 1.0
main: nl.jdries.perfbridge.PerfBridge
api-version: 26.1.2
description: Per-tick performance logger (MSPT, CPU temp, freq, power)
authors: [jan]

commands:
  perfmon:
    description: Start/stop per-tick performance recording
    usage: /perfmon start [seconds] | /perfmon stop
    permission: perfbridge.use
    permission-message: You don't have permission.

permissions:
  perfbridge.use:
    description: Use /perfmon
    default: op
